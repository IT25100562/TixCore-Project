<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar(active)">
    <h1>TixCore</h1>
    <div class="sidebar-user">
        <div class="avatar" th:text="${session.fullName != null ? #strings.substring(session.fullName,0,1) : 'A'}">A</div>
        <div>
            <div class="su-name" th:text="${session.fullName}">Admin</div>
            <div class="su-role"
                 th:text="${session.adminRole == 'superadmin' or session.adminRole == 'super_admin' ? 'Super Admin' :
                            (session.adminRole == 'manager' ? 'Manager' :
                            (session.adminRole == 'support' ? 'Support' : 'Administrator'))}">Administrator</div>
        </div>
    </div>
    <nav>
        <a th:href="@{/}" th:classappend="${active=='dashboard'} ? 'active'">Dashboard</a>
        <a th:href="@{/events}" th:classappend="${active=='events'} ? 'active'">Events</a>
        <a th:href="@{/venues}" th:classappend="${active=='venues'} ? 'active'">Venues</a>
        <a th:href="@{/bookings}" th:classappend="${active=='bookings'} ? 'active'">Bookings</a>
        <a th:href="@{/reviews}" th:classappend="${active=='reviews'} ? 'active'">Reviews</a>
        <!-- Users & Admins: visible only to super_admin -->
        <a th:if="${session.adminRole == 'superadmin' or session.adminRole == 'super_admin'}"
           th:href="@{/users}" th:classappend="${active=='users'} ? 'active'">Users</a>
        <a th:if="${session.adminRole == 'superadmin' or session.adminRole == 'super_admin'}"
           th:href="@{/admins}" th:classappend="${active=='admins'} ? 'active'">Admins</a>
        <a th:href="@{/app/profile}">My Profile</a>
    </nav>
    <button type="button" class="theme-toggle" onclick="window.toggleTheme && window.toggleTheme()">
        <span class="theme-icon-light">☀</span>
        <span class="theme-icon-dark">☾</span>
        <span class="theme-label">Toggle theme</span>
    </button>
    <a th:href="@{/logout}" class="logout-link">Sign out</a>
    <script th:src="@{/js/theme.js}"></script>
</aside>

<header class="user-nav" th:fragment="usernav(active)">
    <div class="user-nav-inner">
        <a th:href="@{/app/home}" class="brand">TixCore</a>
        <nav class="user-nav-links">
            <a th:href="@{/app/home}" th:classappend="${active=='home'} ? 'active'">Browse Events</a>
            <a th:href="@{/app/my-bookings}" th:classappend="${active=='bookings'} ? 'active'">My Bookings</a>
            <a th:href="@{/app/profile}" th:classappend="${active=='profile'} ? 'active'">Profile</a>
        </nav>
        <div class="user-nav-right">
            <button type="button" class="theme-toggle theme-toggle-nav" onclick="window.toggleTheme && window.toggleTheme()" title="Toggle theme">
                <span class="theme-icon-light">☀</span>
                <span class="theme-icon-dark">☾</span>
            </button>
            <span class="hello">Hi, <strong th:text="${session.fullName}">User</strong></span>
            <a th:href="@{/logout}" class="btn btn-secondary btn-sm">Sign out</a>
        </div>
    </div>
    <script th:src="@{/js/theme.js}"></script>
</header>
</body>
</html>
