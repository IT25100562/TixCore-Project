<!DOCTYPE html>
<!-- Defines HTML5 document type -->

<html xmlns:th="http://www.thymeleaf.org">
<!-- Thymeleaf template engine is used -->

<head>
    <meta charset="UTF-8"/>
    <!-- Set character encoding -->

    <title>Event Form | TixCore</title>
    <!-- Page title -->

    <!-- Link CSS file -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>
<div class="layout">

    <!-- Load sidebar layout (reusable UI component) -->
    <div th:replace="~{fragments/layout :: sidebar('events')}"></div>

    <main class="main">

        <!-- Page heading: shows 'Edit Event' or 'New Event' -->
        <div class="page-header">
            <h2 th:text="${event.id != null} ? 'Edit Event' : 'New Event'">Event</h2>
        </div>

        <div class="card">

            <!-- Form to submit event data -->
            <!-- th:object binds form to Event object -->
            <form th:action="@{/events}" method="post" th:object="${event}">

                <!-- Hidden field for Event ID (used when editing) -->
                <input type="hidden" th:field="*{id}"/>

                <!-- Hidden field for creation date -->
                <input type="hidden" th:field="*{createdAt}"/>

                <!-- Event Title Input -->
                <div class="field">
                    <label>Title</label>
                    <input type="text" th:field="*{title}" required/>
                </div>

                <!-- Event Description Input -->
                <div class="field">
                    <label>Description</label>
                    <textarea th:field="*{description}"></textarea>
                </div>

                <!-- Event Category Dropdown -->
                <div class="field">
                    <label>Category</label>
                    <select th:field="*{category}">
                        <option value="Concert">Concert</option>
                        <option value="Conference">Conference</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Festival">Festival</option>
                        <option value="Networking">Networking</option>
                        <option value="Sports">Sports</option>
                        <option value="Theatre">Theatre</option>
                    </select>
                </div>

                <!-- Event Date Input -->
                <div class="field">
                    <label>Date</label>

                    <!-- Date input with validation -->
                    <!-- Prevents selecting past dates for new events -->
                    <input type="date" th:field="*{date}" required
                           th:min="${event.id != null} ? '' : ${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}"
                           th:attr="min=${event.id != null} ? '' : ${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}"/>

                    <!-- Show error message if date is invalid -->
                    <small th:if="${dateError}"
                           th:text="${dateError}"
                           style="color:#e53e3e;"></small>
                </div>

                <!-- Event Time Input -->
                <div class="field">
                    <label>Time</label>
                    <input type="time" th:field="*{time}"/>
                </div>

                <!-- Venue Selection Dropdown -->
                <div class="field">
                    <label>Venue</label>

                    <select th:field="*{venueId}" required>
                        <option value="">-- select venue --</option>

                        <!-- Loop through venues list -->
                        <option th:each="v : ${venues}"
                                th:value="${v.id}"
                                th:text="${v.name}"></option>
                    </select>
                </div>

                <!-- Base Ticket Price -->
                <div class="field">
                    <label>Base Price</label>
                    <input type="number" step="0.01" th:field="*{basePrice}"/>
                </div>

                <!-- Event Status Dropdown -->
                <div class="field">
                    <label>Status</label>
                    <select th:field="*{status}">
                        <option value="scheduled">Scheduled</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <!-- Form Buttons -->
                <div class="actions">
                    <!-- Submit button -->
                    <button class="btn" type="submit">Save</button>

                    <!-- Cancel and go back to event list -->
                    <a class="btn btn-secondary" th:href="@{/events}">Cancel</a>
                </div>

            </form>
        </div>
    </main>
</div>
</body>
</html>
``
