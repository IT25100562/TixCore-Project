<!DOCTYPE html>
<!-- HTML5 document -->

<html xmlns:th="http://www.thymeleaf.org">
<!-- Enable Thymeleaf template engine -->

<head>
    <meta charset="UTF-8"/>

    <!-- Dynamic title using event name -->
    <title th:text="${event.title} + ' | TixCore'">Event</title>

    <!-- Link CSS file -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body class="app-body">

<!-- Navigation bar -->
<div th:replace="~{fragments/layout :: usernav('home')}"></div>

<main class="app-main">

    <!-- Back navigation to event list -->
    <a th:href="@{/app/home}" class="back-link">← Back to events</a>

    <!-- ================= EVENT DETAILS ================= -->
    <div class="event-detail">

        <!-- Event category banner (used for styling) -->
        <div class="event-detail-banner" th:attr="data-cat=${event.category}">
            <span th:text="${event.category}"></span>
        </div>

        <div class="event-detail-body">

            <!-- Event title -->
            <h1 th:text="${event.title}"></h1>

            <!-- Event information -->
            <div class="event-meta-row">

                <span>
                    <strong>Date:</strong>
                    <span th:text="${event.date}"></span>
                </span>

                <span>
                    <strong>Time:</strong>
                    <span th:text="${event.time}"></span>
                </span>

                <!-- Display venue name (if found) -->
                <span>
                    <strong>Venue:</strong>
                    <span th:text="${venue != null ? venue.name : 'TBA'}"></span>
                </span>

                <!-- Display ticket price -->
                <span class="event-price-big"
                      th:text="'Rs. ' + ${event.basePrice} + ' / seat'"></span>
            </div>

            <!-- Event description -->
            <p class="event-description" th:text="${event.description}"></p>

        </div>
    </div>

    <!-- ================= SEAT BOOKING SYSTEM ================= -->
    <section class="cinema"
             th:attr="data-event-id=${event.id},data-base-price=${event.basePrice}">
        <!-- data-event-id → used by JS to identify event -->
        <!-- data-base-price → used for price calculation -->

        <h2 class="cinema-title">Choose your seats</h2>

        <!-- Screen UI representation -->
        <div class="screen">
            <div class="screen-bar"></div>
            <span class="screen-label">SCREEN</span>
        </div>

        <!-- Seat grid loaded dynamically using JavaScript -->
        <div id="seatGrid" class="seat-grid">
            <div class="seat-loading">Loading seat map…</div>
        </div>

        <!-- Seat legend -->
        <div class="seat-legend">
            <div><span class="seat-dot available"></span> Available</div>
            <div><span class="seat-dot selected"></span> Selected</div>
            <div><span class="seat-dot booked"></span> Booked</div>
            <div><span class="seat-dot locked"></span> Held</div>
        </div>

        <!-- ================= BOOKING SUMMARY ================= -->
        <div class="booking-summary">

            <!-- Left side: seat details -->
            <div class="bs-left">

                <!-- Selected seats -->
                <div class="bs-row">
                    <span>Selected seats:</span>
                    <strong id="selectedSeatsLabel">None</strong>
                </div>

                <!-- Number of seats -->
                <div class="bs-row">
                    <span>Quantity:</span>
                    <strong id="seatCount">0</strong>
                </div>

                <!-- Total price calculation -->
                <div class="bs-row total">
                    <span>Total:</span>
                    <strong id="totalPrice">Rs. 0</strong>
                </div>
            </div>

            <!-- Right side: buttons & timer -->
            <div class="bs-right">

                <!-- Timer shows how long seats are locked -->
                <div id="timerBox" class="timer-box hidden">
                    <div class="timer-label">Seats held for</div>
                    <div id="timer" class="timer-value">05:00</div>
                </div>

                <!-- Booking process buttons -->
                <button id="proceedBtn" class="btn btn-lg" disabled>
                    Proceed
                </button>

                <button id="confirmBtn" class="btn btn-lg btn-success hidden">
                    Confirm Booking
                </button>

                <button id="cancelLockBtn" class="btn btn-lg btn-secondary hidden">
                    Cancel
                </button>

            </div>
        </div>

        <!-- Message display area (errors, info, success) -->
        <div id="cinemaMessage" class="cinema-message"></div>

    </section>

    <!-- ================= REVIEWS SECTION ================= -->
    <div class="card" style="margin-top:24px;">

        <!-- Display number of reviews -->
        <h3>Reviews (<span th:text="${reviews.size()}">0</span>)</h3>

        <!-- Show message if no reviews -->
        <div th:if="${reviews.isEmpty()}" class="empty" style="padding:20px;">
            Be the first to review.
        </div>

        <!-- Loop through reviews -->
        <div class="review-list">
            <div class="review-item" th:each="r : ${reviews}">

                <!-- Review header (username + rating) -->
                <div class="review-head">
                    <strong th:text="${userNames[r.userId]}">User</strong>

                    <!-- Dynamic star rating -->
                    <span class="stars"
                          th:text="${'★'.repeat(r.rating) + '☆'.repeat(5 - r.rating)}">
                    </span>
                </div>

                <!-- Review comment -->
                <p th:text="${r.comment}"></p>

            </div>
        </div>

        <!-- Add review form -->
        <h4 style="margin-top:16px;">Leave a review</h4>

        <form method="post"
              th:action="@{'/app/event/' + ${event.id} + '/review'}">

            <!-- Rating selection -->
            <div class="field">
                <label>Rating</label>
                <select name="rating">
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Great</option>
                    <option value="3">3 - Okay</option>
                    <option value="2">2 - Poor</option>
                    <option value="1">1 - Bad</option>
                </select>
            </div>

            <!-- User comment -->
            <div class="field">
                <label>Comment</label>
                <textarea name="comment" required></textarea>
            </div>

            <!-- Submit review -->
            <button class="btn" type="submit">Submit Review</button>
        </form>

    </div>

</main>
