<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Admins | TixCore</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="layout">
    <div th:replace="~{fragments/layout :: sidebar('admins')}"></div>
    <main class="main">
        <div class="page-header">
            <div><h2>Admin Users</h2><p th:text="${admins.size()} + ' admin accounts'"></p></div>
            <a class="btn" th:href="@{/admins/new}">+ New Admin</a>
        </div>
        <div class="list-toolbar">
            <div class="search-wrap">
                <span class="search-icon">&#9906;</span>
                <input class="search-input" id="searchInput" type="text" placeholder="Search by username, name or email…" oninput="filterTable()"/>
            </div>
            <div class="filter-wrap">
                <select class="filter-select" id="roleFilter" onchange="filterTable()">
                    <option value="">All Roles</option>
                    <option value="superadmin">Super Admin</option>
                    <option value="manager">Manager</option>
                    <option value="support">Support</option>
                </select>
            </div>
        </div>
        <table id="dataTable" th:if="${!admins.isEmpty()}">
            <thead><tr><th>Username</th><th>Full Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="a : ${admins}" th:attr="data-role=${a.role}">
                    <td th:text="${a.username}"></td>
                    <td th:text="${a.fullName}"></td>
                    <td th:text="${a.email}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${a.role == 'superadmin' ? 'badge-confirmed' : (a.role == 'manager' ? 'badge-scheduled' : 'badge-pending')}"
                              th:text="${a.role}"></span>
                    </td>
                    <td class="actions">
                        <a class="btn btn-sm btn-secondary" th:href="@{'/admins/' + ${a.id} + '/edit'}">Edit</a>
                        <form th:action="@{'/admins/' + ${a.id} + '/delete'}" method="post" style="display:inline;">
                            <button class="btn btn-sm btn-danger" onclick="return confirm('Delete this admin?')">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div id="noResults" class="card empty" style="display:none;">No admins match your search.</div>
        <div th:if="${admins.isEmpty()}" class="card empty">No admins yet.</div>
    </main>
</div>
<script>
function filterTable() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    var role = document.getElementById('roleFilter').value;
    var rows = document.querySelectorAll('#dataTable tbody tr');
    var visible = 0;
    rows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        var matchQ = !q || text.includes(q);
        var matchRole = !role || row.dataset.role === role;
        var show = matchQ && matchRole;
        row.style.display = show ? '' : 'none';
        if (show) visible++;
    });
    document.getElementById('noResults').style.display = (visible === 0) ? '' : 'none';
}
</script>
</body>
</html>
