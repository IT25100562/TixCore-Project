<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Bookings | TixCore</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="layout">
    <div th:replace="~{fragments/layout :: sidebar('bookings')}"></div>
    <main class="main">
        <div class="page-header">
            <div><h2>Bookings</h2><p th:text="${bookings.size()} + ' total bookings'"></p></div>
            <a th:unless="${session.adminRole == 'support'}" class="btn" th:href="@{/bookings/new}">+ New Booking</a>
        </div>
        <div class="list-toolbar">
            <div class="search-wrap">
                <span class="search-icon">&#9906;</span>
                <input class="search-input" id="searchInput" type="text" placeholder="Search by user, event or seats…" oninput="filterTable()"/>
            </div>
            <div class="filter-wrap">
                <select class="filter-select" id="statusFilter" onchange="filterTable()">
                    <option value="">All Statuses</option>
                    <option>confirmed</option>
                    <option>pending</option>
                    <option>cancelled</option>
                </select>
            </div>
        </div>
        <table id="dataTable" th:if="${!bookings.isEmpty()}">
            <thead><tr><th>User</th><th>Event</th><th>Seats</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="b : ${bookings}" th:attr="data-status=${b.status}">
                    <td><span th:each="u : ${users}" th:if="${u.id == b.userId}" th:text="${u.fullName}"></span></td>
                    <td><span th:each="e : ${events}" th:if="${e.id == b.eventId}" th:text="${e.title}"></span></td>
                    <td th:text="${b.seats}"></td>
                    <td th:text="'Rs. ' + ${#numbers.formatDecimal(b.totalPrice,1,'COMMA',0,'POINT')}"></td>
                    <td><span class="badge" th:classappend="'badge-' + ${b.status}" th:text="${b.status}"></span></td>
                    <td th:text="${b.createdAt != null ? #strings.substring(b.createdAt,0,10) : ''}"></td>
                    <td class="actions" th:unless="${session.adminRole == 'support'}">
                        <a class="btn btn-sm btn-secondary" th:href="@{'/bookings/' + ${b.id} + '/edit'}">Edit</a>
                        <form th:action="@{'/bookings/' + ${b.id} + '/delete'}" method="post" style="display:inline;">
                            <button class="btn btn-sm btn-danger" onclick="return confirm('Delete this booking?')">Delete</button>
                        </form>
                    </td>
                    <td th:if="${session.adminRole == 'support'}" class="actions"><span style="color:#94a3b8;">View only</span></td>
                </tr>
            </tbody>
        </table>
        <div id="noResults" class="card empty" style="display:none;">No bookings match your search.</div>
        <div th:if="${bookings.isEmpty()}" class="card empty">No bookings yet.</div>
    </main>
</div>
<script>
function filterTable() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    var status = document.getElementById('statusFilter').value;
    var rows = document.querySelectorAll('#dataTable tbody tr');
    var visible = 0;
    rows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        var matchQ = !q || text.includes(q);
        var matchStatus = !status || row.dataset.status === status;
        var show = matchQ && matchStatus;
        row.style.display = show ? '' : 'none';
        if (show) visible++;
    });
    document.getElementById('noResults').style.display = (visible === 0) ? '' : 'none';
}
</script>
</body>
</html>
